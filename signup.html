<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <style>
        /* Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        /* Signup Card Wrapper */
        .signup-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
        }

        .signup-form h2 {
            color: #333;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .signup-form p {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Form Row for Full Name (Two columns on desktop) */
        .form-row {
            display: flex;
            gap: 15px;
        }

        /* Input Form Groups */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            flex: 1;
        }

        .input-group label {
            display: block;
            color: #444;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Terms and Conditions checkbox */
        .terms-conditions {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            color: #555;
            font-size: 14px;
            margin-bottom: 24px;
            cursor: pointer;
            line-height: 1.3;
        }

        .terms-conditions input {
            margin-top: 3px;
        }

        .terms-conditions a {
            color: #667eea;
            text-decoration: none;
        }

        .terms-conditions a:hover {
            text-decoration: underline;
        }

        /* Sign Up Button */
        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .signup-btn:hover {
            opacity: 0.9;
        }

        /* Footer Text */
        .login-text {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #666;
        }

        .login-text a {
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
        }

        .login-text a:hover {
            text-decoration: underline;
        }

        /* Responsive Breakpoint for Name Fields */
        @media (max-width: 480px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <form class="signup-git add .form">
            <h2>Sign-Up Page</h2>
            <p>Create your account in just a few clicks</p>
            
            <div class="form-row">
                <div class="input-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" placeholder="John" required>
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" placeholder="Doe" required>
                </div>
            </div>
            
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@domain.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Choose a strong password" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" required>
            </div>
            
            <label class="terms-conditions">
                <input type="checkbox" required> 
                <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
            </label>
            
            <button type="submit" class="signup-btn">Create Account</button>
            
            <p class="login-text">Already have an account? <a href="#">Log in</a></p>
        </form>
    </div>

</body>
</html>
